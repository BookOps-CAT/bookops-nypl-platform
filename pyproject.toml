[project]
name = "bookops-nypl-platform"
version = "0.6.0"
description = "BookOps Python wrapper around NYPL Platform API"
license = "MIT"
authors = [{name = "Tomasz Kalata", email = "klingaroo@gmail.com"}, {name = "Charlotte Kostelic", email = "charlottekostelic@bookops.org"}]
readme = "README.md"
requires-python = ">=3.9"
keywords = ["api", "cataloging", "bibliographic records", "library metadata", "nypl"]
dependencies = ["requests (>=2.32.3, <3.0.0)",  "types-requests (>=2.32.4.20260107,<3.0.0.0)"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
pytest-mock = "^3.14.0"
pytest-cov = "^5.0.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["webtest: mark a test hitting live endpoints"]
addopts = '-m "not webtest" --cov=bookops_nypl_platform/'

[tool.coverage.run]
relative_files = true
source = ["."]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false